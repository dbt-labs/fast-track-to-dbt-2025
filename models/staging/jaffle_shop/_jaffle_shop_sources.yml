sources:
  - name: jaffle_shop
    description: This is a replica of the Postgres database used by our app
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: One record per customer.
        columns:
          - name: id
            data_tests:
              - not_null
              - unique

      - name: orders
        description: One record per order. Includes cancelled and deleted orders.
        columns:
          - name: id
            data_tests:
              - not_null
              - unique
            description: Unique id for order.
          - name: user_id
            data_tests:
              - not_null
            description: user_id based on customers.