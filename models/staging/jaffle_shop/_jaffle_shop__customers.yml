version: 2

models:
  - name: stg_jaffle_shop__customers
    description: customers who have accounts or activity in the jaffle shop application.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: customer's given name.
        data_tests:
          - not_null
      - name: last_name
        description: customer's family name.
        data_tests:
          - not_null
