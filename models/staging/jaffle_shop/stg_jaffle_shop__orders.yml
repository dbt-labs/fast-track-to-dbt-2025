version: 2

models:
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['returned','completed','return_pending','placed','shipped']