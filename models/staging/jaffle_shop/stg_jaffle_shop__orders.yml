models:
  - name: stg_jaffle_shop__orderss
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              column_namen_name: customer_id
              nameme: ref('stg_jaffle_shop__customers')           
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['returned', 'completed', 'returned_pending', 'shipped', 'placed']
      - name: _etl_loaded_at
        tests:
          - not_null
