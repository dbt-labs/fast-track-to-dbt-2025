models:
    - name: stg_jaffle_shop__orders 
      columns:
        - name: order_id 
          data_tests:
            - unique
            - not_null
        - name: customer_id 
          data_tests:
            - not_null
            - relationships:  
                field: customer_id
                to: ref('stg_jaffle_shop__customers')
        - name: order_date 
          data_tests:
            - not_null
        - name: status 
          data_tests:
            - not_null
            - accepted_values:
                values:
                  - 'returned'
                  - 'completed'
                  - 'return_pending'
                  - 'shipped'
                  - 'placed'
        - name: _etl_loaded_at
          data_tests:
            - not_null


