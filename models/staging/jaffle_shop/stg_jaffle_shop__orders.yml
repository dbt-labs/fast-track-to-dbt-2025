models:
  - name: stg_jaffle_shop__orders
    description: orders placed by customers in the jaffle shop app.
    columns:
      - name: order_id
        description: unique identifier for an order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_date
        description: date the order was placed.
        data_tests:
          - not_null
      - name: status
        description: current lifecycle status of the order.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']
      - name: _etl_loaded_at
        description: timestamp when the order record was loaded into the warehouse.
        data_tests:
          - not_null