version: 2

models:
  - name: stg_jaffle_shop__orders
    description: one record per customer order from the jaffle shop application.
    columns:
      - name: order_id
        description: unique identifier for an order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: id
      - name: order_date
        description: date the order was placed.
        data_tests:
          - not_null
      - name: status
        description: current lifecycle status of the order.
      - name: _etl_loaded_at
        description: timestamp when the order record was loaded into the warehouse.
