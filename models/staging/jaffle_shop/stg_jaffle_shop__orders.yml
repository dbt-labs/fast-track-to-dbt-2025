models:
  - name: stg_jaffle_shop__orders
    description: This model serves as a staging layer for orders data from the Jaffle Shop. It renames and selects relevant fields from the source orders table, preparing the data for further transformations and analysis. The model ensures data consistency and integrity by applying tests on key columns.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'returned'
                - 'return_pending'
                - 'completed'
                - 'shipped'
                - 'placed'
      - name: _etl_loaded_at
        description: The timestamp when the order record was loaded into the data warehouse.
        tests:
          - not_null
