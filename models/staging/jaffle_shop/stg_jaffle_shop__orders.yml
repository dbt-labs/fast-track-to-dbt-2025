version: 2

models:
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: id

      - name: order_date
        data_tests:
          - not_null

      - name: status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'returned'
                  - 'completed'
                  - 'return_pending'
                  - 'shipped'
                  - 'placed'

      - name: _etl_loaded_at
