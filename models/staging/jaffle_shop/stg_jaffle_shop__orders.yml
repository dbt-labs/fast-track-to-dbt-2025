models:
  - name: stg_jaffle_shop__orders
    description: "Table containing customer orders"
    columns:
      - name: order_id
        description: "Primary key for orders"
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Foreign key referencing customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id

      - name: order_date
        description: "Date when the order was placed"
        tests:
          - not_null

      - name: status
        description: "Status of the order"
        tests:
          - not_null
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']