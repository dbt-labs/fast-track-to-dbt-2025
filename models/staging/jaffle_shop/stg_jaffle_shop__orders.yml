version: 2

models:
  - name: stg_jaffle_shop__orders
    description: One record per order from the jaffle_shop source, renamed into staging conventions.
    columns:
      - name: order_id
        description: Primary key for the order record.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: Date the order was placed.
        data_tests:
          - not_null
      - name: status
        description: Order status from the source system.
      - name: _etl_loaded_at
        description: Timestamp when the record was loaded by the ingestion process.
