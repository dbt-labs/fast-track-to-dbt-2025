models:
  - name: stg_jaffle_shop__orders
    description: This model stages the orders data from the 'jaffle_shop' source, preparing it for further transformations and analysis. It includes essential order details such as order ID, customer ID, order date, status, and the timestamp when the data was loaded into the system.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating whether it is completed, returned, or pending return.
        tests:
          - not_null
          - accepted_values:
              values:
                - 'returned'
                - 'completed'
                - 'return_pending'
      - name: _etl_loaded_at
        description: The timestamp indicating when the order data was loaded into the system.
        tests:
          - not_null
