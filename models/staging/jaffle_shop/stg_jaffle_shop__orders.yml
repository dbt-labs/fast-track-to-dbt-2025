models:
  - name: stg_jaffle_shop__orders
    description: This model stages order data from the jaffle_shop source, renaming and selecting relevant fields for further analysis. It provides a structured view of customer orders, including their status and the date they were placed, which is essential for tracking order fulfillment and customer interactions.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_jaffle_shop__customers')
      - name: order_date
        description: The date when the order was placed.
        tests:
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        tests:
          - accepted_values:
              values:
                - 'returned'
                - 'completed'
                - 'return_pending'
                - 'shipped'
                - 'placed'
      - name: _etl_loaded_at
        description: The timestamp when the order data was loaded into the system.
        tests:
          - not_null