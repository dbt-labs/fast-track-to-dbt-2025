models:
- name: stg_jaffle_shop__orders
  description: This model serves as a staging layer for the orders data from the Jaffle
    Shop source. It renames and selects relevant fields to prepare the data for further
    transformations and analysis.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: user_id
    description: The identifier of the user who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order.
  - name: _etl_loaded_at
    description: The timestamp indicating when the record was loaded into the system.
