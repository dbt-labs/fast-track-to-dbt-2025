models:
- name: stg_jaffle_shop__orders
  description: This model serves as a staging layer for the orders data from the Jaffle
    Shop source. It renames and selects relevant fields to standardize the data for
    downstream analysis and reporting.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, such as 'completed' or 'pending'.
