models:
  - name: stg_jaffle_shop__orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              arguments: customer_id

      - name: order_date
        data_tests:
          - not_null

      - name: status

      - name: _etl_loaded_at