models:
  - name: stg_jaffle_shop__orders
    description: This model serves as a staging layer for the orders data from the Jaffle Shop source. It renames and selects relevant columns to prepare the data for further transformations and analysis.
    columns:
      - name: id
        description: Unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: user_id
        description: Identifier for the user who placed the order.
        data_tests:
          - not_null        
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: Current status of the order.
        data_tests:
          - not_null
      - name: _etl_loaded_at
        description: Timestamp indicating when the record was loaded into the ETL system.
        data_tests:
          - not_null