version: 2

models:
  - name: stg_jaffle_shop__orders
    description: Staged order records from the jaffle_shop source.
    columns:
      - name: order_id
        description: Primary key for the order.
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Foreign key to the customer placing the order.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id

      - name: order_date
        description: Date the order was placed.
        data_tests:
          - not_null

      - name: status
        description: Current order status.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed',
                        'returned',
                        'shipped',
                        'placed',
                        'return_pending']
