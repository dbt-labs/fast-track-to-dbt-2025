version: 2

models:
  - name: stg_jaffle_shop__orders
    description: Staged orders from the jaffle_shop source with renamed business-friendly columns.
    columns:
      - name: order_id
        description: Primary key for the order.
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: Foreign key to the staged customer record.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id

      - name: order_date
        description: Date the order was placed.
        data_tests:
          - not_null

      - name: status
        description: Current order lifecycle status.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: _etl_loaded_at
        description: timestamp when the order record was loaded into the warehouse.



  - name: stg_jaffle_shop__customers
    description: customer records from jaffle shop with standardized customer attributes.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
      - name: first_name
        description: customer's first name.
      - name: last_name
        description: customer's last name.
