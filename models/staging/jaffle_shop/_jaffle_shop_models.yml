version: 2

models:
  - name: stg_jaffle_shop__customers
    description: Staged customer records from the jaffle_shop source.
    columns:
      - name: customer_id
        description: Primary key for a customer.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.

  - name: stg_jaffle_shop__orders
    description: Staged order records from the jaffle_shop source.
    columns:
      - name: order_id
        description: Primary key for an order.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Current order status.
