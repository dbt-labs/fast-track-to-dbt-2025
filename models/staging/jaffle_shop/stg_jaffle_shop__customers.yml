version: 2

models:
  - name: stg_jaffle_shop__customers
    description: Staged customer records from the jaffle_shop source.
    columns:
      - name: customer_id
        description: Primary key for the customer.
        data_tests:
          - not_null
          - unique

      - name: first_name
        description: Customer first name.
        data_tests:
          - not_null

      - name: last_name
        description: Customer last name.
        data_tests:
          - not_null
