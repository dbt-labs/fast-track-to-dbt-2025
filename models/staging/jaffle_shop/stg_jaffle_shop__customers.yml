version: 2

models:
  - name: stg_jaffle_shop__customers
    description: One record per customer from the jaffle_shop source, renamed into staging conventions.
    columns:
      - name: customer_id
        description: Primary key for the customer record.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.
