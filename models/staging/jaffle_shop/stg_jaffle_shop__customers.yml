version: 2

models:
  - name: stg_jaffle_shop__customers
    description: customer records from jaffle shop with one row per customer.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: customer's first name.
        data_tests:
          - not_null
      - name: last_name
        description: customer's last name.
        data_tests:
          - not_null
