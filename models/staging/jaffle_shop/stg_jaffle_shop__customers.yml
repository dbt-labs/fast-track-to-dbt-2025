models:
  - name: stg_jaffle_shop__customers
    description: customer records used for analytics and downstream customer reporting.
    columns:
      - name: customer_id
        description: unique identifier for a customer.
        data_tests:
          - unique
          - not_null

      - name: first_name
        description: customer's first name.
        data_tests:
          - not_null

      - name: last_name
        description: customer's last name.
        data_tests:
          - not_null
