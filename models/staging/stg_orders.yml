models:
- name: stg_orders
  description: This model consolidates order information from the 'jaffle_shop' source,
    providing a structured view of orders with key details such as order ID, customer
    ID, order date, and status. It serves as a foundational dataset for analyzing
    customer orders and their statuses.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.
