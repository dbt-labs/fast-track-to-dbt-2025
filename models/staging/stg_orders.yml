models:
  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming and preparing it for further analysis. It includes key details about each order, such as the order ID, customer ID, order date, and status, which are essential for tracking and analyzing order processing and customer interactions.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref("stg_customers")
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values:
                - returned
                - completed
                - return_pending
                - shipped
                - placed