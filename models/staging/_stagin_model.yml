models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: stg_orders
        description: this is stging order and ensures for customer id. 
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            data-tests:
              - not_null
              - relationships:
                  to: ref('stg_customers')
                  field: customer_id
          - name: order_date
            tests:
              - not_null
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values:
                    [
                      "completed",
                      "retuned",
                      "shipped",
                      "placed",
                      "not_completed",
                    ]
