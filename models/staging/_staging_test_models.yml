models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming and 
      preparing it for downstream analysis. It extracts customer information from the raw data source, 
      ensuring that each customer is uniquely identified and their names are properly formatted for further use.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming and preparing it 
      for downstream analysis. 
      It extracts order information from the raw data source, ensuring that each order is uniquely 
      identified and associated with the correct customer. 
      The model also captures the order date and current status, which are essential for tracking order 
      lifecycle and customer interactions.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order.
        data_tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating whether it is completed or returned.
        data_tests:
          - not_null

