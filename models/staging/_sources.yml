sources:
  - name: jaffle_shop
    description: This is a replica of the Postgres database used by our app
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: table with jaffle_shop customers data
        columns:
          - name: id
            description: primary key for jaffle_shop.customers
            data_tests:
              - unique
              - not_null

      - name: orders
        description: table with jaffle_shop orders data
        columns:
          - name: id
            description: primary key for jaffle_shop.orders
            data_tests:
              - unique
              - not_null
     