models:
- name: stg_customers
  description: This model serves as a staging layer for customer data, transforming
    raw customer information into a standardized format for downstream analysis. It
    extracts customer identifiers and names from the raw data source.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
