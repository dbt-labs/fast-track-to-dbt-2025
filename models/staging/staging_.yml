models:
- name: stg_customers
  description: This model extracts and standardizes customer data from the 'jaffle_shop'
    source, providing a clean and consistent view of customer information for downstream
    analysis.
  columns:
  - name: customer_id
    data_tests:
      - not_null
    description: A unique identifier for each customer, derived from the original
      'id' field.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.


- name: stg_orders
  description: This model serves as a staging layer for order data from the Jaffle
    Shop source. It standardizes and prepares order information for further analysis,
    ensuring consistency in key identifiers and date formats.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
