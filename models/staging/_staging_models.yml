models:
  - name: stg_customers
    description: This model stages customer data from the 'jaffle_shop' source, providing essential customer identifiers and personal information for further analysis and personalization. It includes unique customer identifiers and names, facilitating customer-specific analyses and transformations in downstream models.
    columns:
      - name: order_id
        description: A unique identifier for each order, used to track order-specific data across models.
      - name: customer_id
        description: A unique identifier for the customer who placed the order, linking orders to customers.
      - name: order_date
        description: The date when the order was placed, used for tracking and analysis of order timelines.
      - name: status
        description: The current status of the order, indicating its progress through the order lifecycle.
      - name: customer_id
        description: A unique identifier for each customer, used to track customer-specific data across models.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer, used for personalization and identification purposes.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer, used for personalization and identification purposes.
        data_tests:
          - not_null

  - name: stg_orders
    description: This model stages order data from the 'jaffle_shop' source, providing a foundational dataset for order-related analyses. It includes essential order identifiers, customer references, order dates, and status, facilitating further transformations and analyses in downstream models.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed','returned','return_pending','placed','shipped']