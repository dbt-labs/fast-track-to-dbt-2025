models:
  - name: stg_customers
    description: This model extracts and stages customer data from the 'jaffle_shop' source, providing a foundational dataset for customer-related analyses. It includes customer identifiers and names, which are essential for joining with other datasets and performing customer-centric analyses.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, used to join with other datasets.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
  - name: stg_orders
    description: This model extracts and stages order data from the 'jaffle_shop' source, providing a foundational dataset for order-related analyses. It includes order identifiers, which are essential for joining with other datasets and performing order-centric analyses.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values:
                - ('completed', 'returned', 'return_pending')