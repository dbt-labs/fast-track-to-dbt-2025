models:
  - name: stg_customers
    description: This model serves as a staging area for customer data, transforming and preparing it for further analysis. 
      It extracts customer information from the source system, ensuring data consistency and readiness for downstream processes.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null
        #  - accepted_values:
         #     values:
          #      - ['completed', 'returned', 'return_pending', 'shipped', 'placed']