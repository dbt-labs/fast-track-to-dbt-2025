models:
  - name: stg_customers
    description: This model provides a staging layer for customer data, transforming and preparing it
     for further analysis. It includes key details about each customer, such as the unique customer identifier, 
     first and last name of customer.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null

  - name: stg_orders
    description: This model provides a staging layer for order data, transforming and preparing it
     for further analysis. It includes key details about each order, such as the unique order identifier, 
     the customer who placed the order, the date the order was made, and the current status of the order.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']