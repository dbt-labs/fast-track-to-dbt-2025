models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data from the 'jaffle_shop' source. It standardizes and prepares customer information for further analysis, including details such as customer identification and names.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data from the 'jaffle_shop' source. It standardizes and prepares order information for further analysis, including details such as order identification, customer association, order date, and current status.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date on which the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed','returned','shipped','placed','return_pending']      
