models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming and preparing it for downstream analysis. It extracts customer information from the source system, ensuring consistency and readiness for further processing.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, ensuring distinctness and traceability across the dataset.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer, used for identification and personalization purposes.
      - name: last_name
        description: The last name of the customer, used for identification and personalization purposes.
  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming and preparing it for downstream analysis. It extracts order information from the source system, ensuring consistency and readiness for further processing.
    columns:
      - name: order_id
        description: A unique identifier for each order, ensuring distinctness and traceability across the dataset.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for each customer associated with the order, ensuring proper linkage to customer data.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date when the order was placed, used for tracking and analysis of order timelines.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress through the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values: ['return_pending','returned','completed','shipped','placed']