models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming raw customer information from the source into a standardized format for downstream analysis. It includes essential customer identifiers and names.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
  - name: stg_orders
    columns:
        - name: order_id
          data_tests:
            - unique
            - not_null
        - name: customer_id
          data_tests:
            - not_null
            - relationships:
                field: customer_id
                to: ref('stg_customers')
        - name: order_date
          data_tests:
            - not_null
        - name: status
          data_tests:
            - not_null
            - accepted_values:
                values: ['return_pending','returned','completed','shipped','placed']
