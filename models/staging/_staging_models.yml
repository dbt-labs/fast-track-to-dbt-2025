models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, providing a clean and standardized view of customer information sourced from the 'jaffle_shop' database. It includes essential customer details such as unique identifiers and names, which are crucial for downstream analytics and reporting.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, ensuring distinct customer records.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer, used for personalization and identification.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer, used for personalization and identification.
        tests:
          - not_null
  
  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref("stg_customers")
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values:
                - "completed"
                - "returned"
                - "return_pending"
                - "shipped"
                - "placed"