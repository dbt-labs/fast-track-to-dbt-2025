models:
  - name: stg_customers
    description: This model extracts and stages customer data from the 'jaffle_shop' source, providing a foundational dataset for customer-related analyses. It includes customer identifiers and names, which are essential for joining with other datasets and performing customer-centric analyses.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, used to join with other datasets.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null

  - name: stg_orders
    description: This model stages order data from the 'jaffle_shop' source, providing a foundational dataset for order-related analyses. It includes order identifiers, customer identifiers, order dates, and statuses, which are essential for tracking order history and status updates.
    columns:
      - name: order_id
        description: A unique identifier for each order, used to track individual orders.
        data_tests:
        - unique
        - not_null
      - name: customer_id
        description: A unique identifier for each customer, used to associate orders with customers.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
              
              
      - name: order_date
        description: The date when the order was placed.
        data_tests:
        - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        data_tests:
        - not_null
        - accepted_values:
            values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']
            


