models:
  - name: stg_customers
    description: This model serves as a staging area for customer data, 
      providing a clean and standardized format for upsteam analysis,
      It extracts customer information from a source system, 
      ensuring that each customer is uniquely identified , 
      and their names are consistently formatted.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, ensuring distinct customer records.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer, used for identification and personalization.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer, used for identification and personalization.
        tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging area for orders data, 
      providing a clean and standardized format for downsteam analysis,
      It extracts order information from a source system, 
      ensuring that each order is uniquely identified 
      and ensures foreign key relationship for customer_id.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']