models:
  - name: stg_customers
    description: This model serves as a staging area for customer data, providing a clean and standardised format for downstream analysis.
      It extracts customer infomration from the source system, ensuring that each customer is uniqiuely identified.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging area for customer data, providing a clean and standardised format for downstream analysis.
      It extracts customer infomration from the source system, ensuring that each order is uniqiuely identified and ensures foreign key relationship for customer_id.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships: 
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']