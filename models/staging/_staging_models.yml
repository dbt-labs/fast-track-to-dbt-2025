models:
  - name: stag_customers
    columns:
      - name: customer_id
        data_tests:
         - unique
         - not_null
      - name: first_name
        data_tests:
         - not_null
      - name: last_name
        data_tests:
         - not_null
        
  - name: stag_orders
    columns:
      - name: order_id
        data_tests:
         - unique
         - not_null            
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')     
      - name: status
        data_tests:
          - accepted_values:
              values: ['returned','completed','return_pending','placed']