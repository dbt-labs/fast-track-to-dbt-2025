models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
  - name: stg_orders
    columns:
    - name: order_id
      data_tests:
        - unique
        - not_null
    - name: customer_id
      data_tests:
        - not_null
        - relationships:
            field: customer_id
            to: ref('stg_customers')
      data_tests:
        - not_null
    - name: order_date
    - name: status
      data_tests:
        - not_null
        - accepted_values:
            values:
              - values: ['return_pending','returned', 'completed', 'shipped', 'placed']