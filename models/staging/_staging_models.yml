models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, preparing it for further transformations and analysis. It extracts customer information from the source system, ensuring that each customer is uniquely identified and their names are available for downstream processes.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null


  - name: stg_orders
    description: This model serves as a staging layer for order data, preparing it for further transformations and analysis. It extracts order information from the source system, ensuring that each order is uniquely identified and their names are available for downstream processes.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed','returned','return_pending','shipped','placed']