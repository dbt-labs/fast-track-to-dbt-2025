models:
  - name: stg_customers
    columns:
      - name: customer_id
        description: One record per customer. Includes cancelled and deleted customers.
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data from the 'jaffle_shop' source. It standardizes and prepares order information for further analysis, including details about the order's unique identifier, the customer who placed the order, the date the order was made, and its current status.
    columns:
      - name: order_id
        description: One record per order. Includes cancelled and deleted orders.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
               arguments: 
                field: customer_id
                to: ref('stg_customers')
      - name: order_date
        description: The date on which the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress through the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed','returned','return_pending','shipped','placed']
