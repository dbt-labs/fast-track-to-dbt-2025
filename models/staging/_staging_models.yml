models:
  - name: stg_customers
    description: This model serves as a staging area for customer data, transforming and 
      preparing it for further analysis. It extracts customer information from the 'jaffle_shop' 
      source, focusing on customer identification and names.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging area for order data, transforming 
      and preparing it for further analysis. It extracts order information from the 'jaffle_shop' 
      source, focusing on order identification, customer association, order dates, and status.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        tests:
          - not_null
          - accepted_values: 
              values: ['pending','completed','return_pending','returned','shipped','placed']

