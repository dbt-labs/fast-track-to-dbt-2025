models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming and preparing it for downstream analysis. It extracts customer information from the source system, ensuring data consistency and readiness for further processing.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
  - name: stg_orders
    description: This model serves as a staging layer for orders data, transforming and preparing it for downstream analysis. It extracts orders information from the source system, ensuring data consistency and readiness for further processing.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']