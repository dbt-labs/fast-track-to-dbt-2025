models:
  - name: stg_customers
    description: This model serves as ....
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming and preparing it for further analysis. It includes key details about each order, such as the unique order identifier, the customer who placed the order, the date the order was made, and the current status of the order.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
      - name: order_date
        description: The date on which the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress or completion.
        tests:
          - not_null