models:
  - name: stg_customers
    description: This model stages customer data from the 'jaffle_shop' source, providing essential details such as customer identifiers and names. It serves as a foundational dataset for customer-related analyses and operations.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
  - name: stg_orders
    description: This model extracts and stages order data from the 'jaffle_shop' source, providing a 
      foundational dataset for analyzing customer orders. It includes key details such as order identifiers, customer associations, order dates, and current status, which are essential for tracking and managing order lifecycles.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date on which the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values:
                - returned
                - completed
                - return_pending
                - shipped
                - placed
