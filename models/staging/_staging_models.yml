models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming raw order information into a structured format for further analysis. It includes key details such as order identifiers, customer associations, order dates, and current status, facilitating comprehensive order tracking and management.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'placed', 'shipped']
              