models:
  - name: stg_customers
    description: This model extracts and prepares customer data from the 'jaffle_shop' source, providing a standardized format for customer information. It includes unique identifiers and basic personal details, facilitating customer-related analyses and operations.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
      - name: customer_id
        description: A unique identifier for each customer.
  - name: stg_orders
    description: This model extracts and prepares order data from the 'jaffle_shop' source, providing a standardized format for order information. It includes unique identifiers, customer references, order dates, and status, facilitating order-related analyses and operations.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress through the order lifecycle.
        tests:
          - not_null
          - accepted_values:
              values: ['return_pending','returned','completed','shipped','placed']