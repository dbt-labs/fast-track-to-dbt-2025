models:
  - name: stg_customers
    description: This model extracts and stages customer data from the 'jaffle_shop' source, providing a foundational dataset for customer-related analyses. It includes essential customer identifiers and names, ensuring data integrity with unique and not-null constraints.
    columns:
      - name: customer_id
        description: A unique identifier for each customer, ensuring distinct customer records.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer, used for identification and personalization.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer, used for identification and personalization.
        data_tests:
          - not_null
  - name: stg_orders
    description: This model stages order data from the 'jaffle_shop' source, providing a foundational dataset for order-related analyses. It includes essential order identifiers, customer references, and order status, ensuring data integrity with unique and not-null constraints.
    columns:
      - name: order_id
        description: A unique identifier for each order, ensuring distinct order records.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order, ensuring accurate customer-order relationships.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date when the order was placed, used for tracking and analysis of order timelines.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the order lifecycle.
        data_tests:
          - not_null
          - accepted_values:
              values: ['return_pending', 'returned', 'completed', 'shipped', 'placed']
