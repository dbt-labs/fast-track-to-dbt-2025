models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming and preparing it for further analysis. It extracts customer information from the source system, ensuring data consistency and readiness for downstream processes.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data, 
                transforming and preparing it for further analysis. It extracts order information from the source system, 
                ensuring data consistency and readiness for downstream processes.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: status
        tests:
          - not_null