models:
  - name: stg_orders
    description: This model serves as a staging area for order data, transforming and preparing it for further analysis. It extracts order information from the source system, ensuring that each order is uniquely identified and associated with the correct customer and status.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The unique identifier for the customer who placed the order.
        data_tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date on which the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        data_tests:
          - not_null
          - accepted_values:
              values: ['return_pending', 'returned', 'completed', 'shipped', 'placed']
  - name: stg_customers
    description: This model serves as a staging area for customer data, transforming and preparing it for further analysis. It extracts customer information from the source system, ensuring that each customer is uniquely identified and their names are accurately captured.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null