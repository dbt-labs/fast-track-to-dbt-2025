models:
- name: stg_customers
  description: This model extracts and standardizes customer information from the
    'jaffle_shop' source, providing a clean and consistent view of customer data for
    downstream analysis.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    data_tests:
      - not_null
    description: The last name of the customer.
- name: stg_orders
  description: This model provides a refined view of order data from the Jaffle Shop,
    focusing on key attributes such as order ID, customer ID, order date, and status.
    It is designed to facilitate analysis of customer orders and their statuses over
    time.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date on which the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
