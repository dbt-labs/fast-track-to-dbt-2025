models:
  - name: stg_customers
    description: This model serves as a staging layer for customer data, transforming raw customer information from the source into a structured format for analysis. It includes key details about each customer, such as the unique customer identifier, first name, and last name.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null

  - name: stg_orders
    description: This model serves as a staging layer for order data, transforming raw order information from the source into a structured format for analysis. It includes key details about each order, such as the unique order identifier, the customer associated with the order, the date the order was placed, and the current status of the order.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')
      - name: order_date
        description: The date on which the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress through the order lifecycle.
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'placed', 'shipped']
