models:
  - name: stg_customers
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_cutomers')
                field: customer_id
      - name: user_id
        data_tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['return_pending', 'returned', 'completed']