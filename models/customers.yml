models:
  - name: customers
    columns:
      - name: CUSTOMER_ID
        data_tests:
          - unique
          - not_null
      - name: FIRST_NAME
        data_tests:
          - not_null
      - name: LAST_NAME
        data_tests:
          - not_null
      - name: FIRST_ORDER_DATE
        data_tests:
          - not_null
      - name: MOST_RECENT_ORDER_DATE
        data_tests:
          - not_null
      - name: NUMBER_OF_ORDERS
        data_tests:
          - not_null
