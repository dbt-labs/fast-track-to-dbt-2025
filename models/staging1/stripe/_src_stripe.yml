sources:
  - name: stripe
    description: schema to store the payments.
    database: raw
    tables:
      - name: payment
        description: payment transaction for each order
        freshness:
          warn_after:
            count: 12
            period: hour
          error_after:
            count: 24
            period: hour
        loaded_at_field: _batched_at
        columns:
          - name: id
            data_tests:
            - unique
            - not_null
          - name: orderid
            data_tests:
            - unique
            
           
