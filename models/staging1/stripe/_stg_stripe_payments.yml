version: 2

models:
  - name: stg_stripe__payments
    description: "contains payment for each order and customer"
    columns:
      - name: payment_id
        data_type: number
        description: "unique payment reference id for the transaction"
        data_tests:
          - unique
          - not_null
          

      - name: order_id
        data_type: number
        description: "order id for each transaction"
        data_tests:
          - not_null
          

      - name: payment_method
        data_type: varchar
        description: ""
        data_tests: 
        - accepted_values:
            arguments:
              values:
              - credit_card
              - coupon
              - bank_transfer
              - gift_card

      - name: status
        data_type: varchar
        description: ""

      - name: amount
        data_type: number
        description: ""