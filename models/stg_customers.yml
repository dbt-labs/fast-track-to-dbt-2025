models:
- name: stg_customers
  description: This model serves as a staging area for customer data, providing a standardized format for customer information to be used in downstream processes.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
    data_tests:
      - unique
      - not_null
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.