models:
  - name: dim_customers
    description: This model consolidates customer information with their order history,
      providing insights into customer activity. It includes personal details of customers
      and their order metrics, such as the date of their first and most recent orders,
      and the total number of orders placed.
    columns:
    - name: customer_id
      description: A unique identifier for each customer. (Primary keys)
      data_tests:
        - unique
        - not_null
    - name: first_name
      description: The first name of the customer.
    - name: last_name
      description: The last name of the customer.
    - name: first_order_date
      description: The date when the customer placed their first order.
    - name: most_recent_order_date
      description: The date when the customer placed their most recent order.
    - name: number_of_orders
      description: The total number of orders placed by the customer.


  - name: fct_orders
    description: This model provides a refined view of order data, including order identifiers,
      customer associations, order dates, and current status. It is designed to facilitate
      analysis of order trends and customer purchasing behavior.
    columns:
    - name: order_id
      description: A unique identifier for each order.
      data_tests:
        - unique
        - not_null
    - name: customer_id
      description: The identifier for the customer who placed the order.
    - name: order_date
      description: The date when the order was placed.
    - name: status
      description: The current status of the order, such as pending, shipped, or completed.
