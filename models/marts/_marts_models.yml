models:
- name: dim_customers
  description: This model provides a comprehensive view of customers, including their
    personal details and order history. It combines customer information with their
    order data to offer insights into customer behavior, such as the date of their
    first and most recent orders, the total number of orders, and their rank based
    on order frequency.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the frequency of their orders,
      with a lower number indicating a higher rank.


- name: fct_orders
  description: This model provides a comprehensive view of customer orders, including
    the customer's first and last name, the date of their first and most recent orders,
    the total number of orders they have placed, and their rank based on the number
    of orders. It is useful for analyzing customer purchasing behavior and identifying
    top customers.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the total number of orders, with
      1 being the highest.
