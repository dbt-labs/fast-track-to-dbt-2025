models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their personal details and order history. 
                 It combines customer information with their order data to determine the first and most recent order dates, the total number of orders, and 
                 ranks customers based on the number of orders they have placed.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order_date
        description: The date when the customer placed their first order. This is NULL if no order exists for the customer.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order. This is NULL if no order exists for the customer.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_rank
        description: The rank of the customer based on the total number of orders, with 1 being the highest.

  - name: fct_orders
    description: This model provides a comprehensive view of orders, including details
      such as order ID, customer ID, order date, and status. It serves as a foundational
      dataset for analyzing order-related metrics and trends.
    columns:
    - name: order_id
      description: A unique identifier for each order.
    - name: customer_id
      description: The identifier for the customer who placed the order.
    - name: order_date
      description: The date on which the order was placed.
    - name: status
      description: The current status of the order, indicating its progress or completion.
