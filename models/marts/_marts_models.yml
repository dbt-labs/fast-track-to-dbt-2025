models:
- name: dim_customers
  description: This model consolidates customer information with their order history,
    providing a comprehensive view of each customer's activity. It includes personal
    details such as first and last names, and order-related metrics like the date
    of the first and most recent orders, as well as the total number of orders placed
    by each customer.
  columns:
  - name: customer_id
    description: A unique identifier for each customer, used to link customer information
      with their order history.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order. This is NULL if no order exists for the customer.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order. This is NULL if no order exists for the customer.
  - name: number_of_orders
    description: The total number of orders placed by the customer.

- name: fct_orders
  description: This model consolidates order information, providing a comprehensive
    view of each order placed by customers. It includes details such as the order
    ID, customer ID, order date, and status, which are essential for tracking and
    analyzing customer orders.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.