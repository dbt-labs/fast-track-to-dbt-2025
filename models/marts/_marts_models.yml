models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their
      personal details and order history. It combines customer information with their
      order data to determine the first and most recent order dates, the total number
      of orders, and ranks customers based on the number of orders they have placed.
    columns:
      - name: customer_id
        description: a unique id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: number_of_orders
        data_tests:
          - not_null
      - name: customer_rank
        data_tests:
          - not_null
  - name: fct_orders
    description: This model provides a refined view of order data, consolidating essential
      order details such as order ID, customer ID, order date, and status. It serves
      as a foundational dataset for analyzing order trends and customer purchasing behavior.
    columns:
      - name: order_id
        description: a unique id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null

      - name: status
        data_tests:
          - not_null