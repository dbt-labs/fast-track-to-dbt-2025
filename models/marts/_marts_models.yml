models:
  - name: dim_customers
    columns:
      - name: customer_id
        description: A unique identifier for each customer. (Primary key)
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order_date
        description: The date when the customer placed their first order. This is NULL if no order exists for the customer.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
    description: This model consolidates customer information with their order history, providing a comprehensive view of each customer's activity. It includes personal details such as first and last names, and order-related metrics like the date of the first and most recent orders, as well as the total number of orders placed by each customer.
  
  - name: fct_orders
    description: This model provides a refined view of order data, including essential
      details such as order ID, customer ID, order date, and status. It serves as a
      foundational dataset for analyzing order trends and customer purchasing behavior.
    columns:
    - name: order_id
      description: A unique identifier for each order.
    - name: customer_id
      description: The unique identifier for the customer who placed the order.
    - name: order_date
      description: The date when the order was placed.
    - name: status
      description: The current status of the order, indicating its progress in the fulfillment
        process.