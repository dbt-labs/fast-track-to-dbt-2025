models:
  - name: dim_customers
    description: This model provides a comprehensive view of customer data, including personal details and order history. It combines customer information with their order activity to facilitate customer analysis and segmentation.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        data_tests:
          - not_null
      - name: customer_rank
        description: The rank of the customer based on the number of orders, with 1 being the highest.
        data_tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
  - name: fct_orders
    description: This model consolidates order data, providing a comprehensive view of each order placed by customers. It includes essential details such as the order ID, customer ID, order date, and current status, facilitating order tracking and analysis.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        data_tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress or completion.
        data_tests:
          - not_null