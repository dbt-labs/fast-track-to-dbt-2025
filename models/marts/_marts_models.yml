models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
      - name: most_recent_order_date
      - name: number_of_orders
  - name: fct_orders
    description: This model provides a detailed view of customer orders, including the order ID, customer ID, order date, and status. It serves as a foundational dataset for analyzing order trends and customer purchasing behavior.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The unique identifier of the customer who placed the order.
        data_tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, such as pending, shipped, or delivered.
        data_tests:
          - not_null