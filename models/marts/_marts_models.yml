models:
- name: dim_customers
  description: This model consolidates customer information and their order activity,
    providing a ranked list of customers based on the number of orders they have placed.
    It is useful for identifying top customers and analyzing customer engagement.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
    data_tests:
      - unique
      - not null
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the number of orders, with 1 being
      the highest.

- name: fct_orders
  description: This model consolidates order data, providing a streamlined view of
    each order's key attributes, such as order ID, customer ID, order date, and status.
    It serves as a foundational dataset for analyzing order trends and customer purchasing
    behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
    data_tests:
      - unique
      - not null
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
