models:
  - name: dim_customers
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order_date
        description: The date when the customer placed their first order. This in null if no order exists for that customer.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order. This in null if no order exists for that customer.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
    description: This model consolidates customer information with their order history, providing insights into customer activity and engagement. It includes personal details and order metrics, such as the first and most recent order dates, and the total number of orders placed by each customer.
  
  - name: fct_orders
    description: This model provides a refined view of order data, including order identifiers,
      customer associations, order dates, and current status. It is designed to facilitate
      analysis of order trends and customer purchasing behavior.
    columns:
    - name: order_id
      description: A unique identifier for each order.
    - name: customer_id
      description: The identifier for the customer who placed the order.
    - name: order_date
      description: The date on which the order was placed.
    - name: status
      description: The current status of the order, indicating its progress in the fulfillment
        process.