models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their
      personal details and order history. It combines customer information with their
      order data to offer insights into customer behavior, such as the date of their
      first and most recent orders, the total number of orders, and their rank based
      on order frequency.
    columns:
    - name: customer_id
      description: A unique identifier for each customer. (Primary key)
    - name: first_name
      description: The first name of the customer.
    - name: last_name
      description: The last name of the customer.
    - name: first_order_date
      description: The date when the customer placed their first order. This is NULL if no order exists for the customer.
    - name: most_recent_order_date
      description: The date when the customer placed their most recent order. This is NULL if no order exists for the customer.
    - name: number_of_orders
      description: The total number of orders placed by the customer.
    - name: customer_rank
      description: The rank of the customer based on the frequency of their orders,
        with 1 being the highest.

  - name: fct_orders
    description: This model provides a detailed view of customer orders, including the
      order ID, customer ID, order date, and status. It is used to track and analyze
      customer order activities.
    columns:
    - name: order_id
      description: A unique identifier for each order. (Primary key)
    - name: customer_id
      description: A unique identifier for the customer who placed the order.
    - name: order_date
      description: The date when the order was placed.
    - name: status
      description: The current status of the order, such as pending, completed, or cancelled.

