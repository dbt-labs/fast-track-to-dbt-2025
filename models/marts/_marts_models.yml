models:
  - name: dim_customers
    description: This model consolidates customer information with their order history, providing insights into customer activity. It includes personal details such as first and last names, and order-related metrics like the date of the first and most recent orders, as well as the total number of orders placed by each customer.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
        tests:
          - not_null
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
        tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        tests:
          - not_null
  - name: fct_orders
    description: This model provides a detailed view of each order, including the order's unique identifier, the customer who placed the order, the date the order was placed, and the current status of the order. It serves as a foundational dataset for analyzing order trends and customer purchasing behavior.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order.
        tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        tests:
          - not_null