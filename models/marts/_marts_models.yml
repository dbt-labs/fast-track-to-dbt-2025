models:
- name: dim_customers
  description: This model consolidates customer information and their order history,
    providing insights into customer activity and ranking based on the number of orders.
    It combines data from the customers and orders staging tables to create a comprehensive
    view of each customer, including their first and most recent order dates, total
    number of orders, and rank among all customers based on order count.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the total number of orders, with
      1 being the highest.

- name: fct_orders
  description: This model provides a refined view of orders, including essential details
    such as order ID, customer ID, order date, and status. It serves as a foundational
    dataset for analyzing customer orders and their statuses over time.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.
