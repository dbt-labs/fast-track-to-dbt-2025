models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
      - name: most_recent_order_date
      - name: number_of_orders
      - name: customer_rank
  - name: fct_orders
    description: This model provides a detailed view of orders, including their unique identifiers, associated customers, order dates, and current status. It serves as a foundational dataset for analyzing order trends, customer purchasing behavior, and order fulfillment processes.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        tests:
          - not_null