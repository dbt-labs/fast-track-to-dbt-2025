models:
- name: ranked_customers_by_orders
  description: This model ranks customers based on the total number of orders they
    have placed. It combines customer information with their order counts to provide
    a ranked list, which can be used for identifying top customers by order volume.
  columns:
  - name: customer_id
    description: A unique identifier for each customer. (Primary Key)
    data_tests:
      - unique
      - not_null
  - name: first_name
    description: The first name of the customer.
  - name: total_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the total number of orders, with
      1 being the highest.

- name: dim_customers
  description: This model consolidates customer information with their order history,
    providing a comprehensive view of each customer's activity. It includes personal
    details such as first and last names, as well as order-related metrics like the
    date of their first and most recent orders, and the total number of orders placed.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
    data_tests:
      - unique
      - not_null
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.

- name: fct_orders
  description: This model provides a streamlined view of order data, consolidating
    essential order details for analysis and reporting. It includes information on
    each order's unique identifier, the customer who placed the order, the date the
    order was made, and the current status of the order.
  columns:
  - name: order_id
    description: A unique identifier for each order.
    data_tests:
      - unique
      - not_null
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date on which the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.
