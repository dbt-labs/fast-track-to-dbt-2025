models:
- name: dim_customers
  description: Beschreibung.
  columns:
  - name: customer_id

- name: fct_orders
  description: This model provides a refined view of orders, including details such
    as order ID, customer ID, order date, and status. It is designed to facilitate
    analysis of order data by providing a clean and consistent dataset.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, such as pending, shipped, or delivered.
