models:
- name: dim_customers
  description: This model consolidates customer information with their order history,
    providing insights into customer activity and engagement. It includes details
    such as the customer's first and last name, the date of their first and most recent
    orders, the total number of orders, and a rank based on order frequency.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the number of orders, with a lower
      rank indicating more orders.
- name: fct_orders
  description: This model consolidates order data, providing a comprehensive view
    of each order, including its unique identifier, the customer who placed it, the
    date it was made, and its current status. It serves as a foundational dataset
    for analyzing order trends and customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The unique identifier of the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.
