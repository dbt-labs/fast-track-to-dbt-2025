models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: first_order_date
        data_tests:
          - not_null
      - name: most_recent_order_date
        data_tests:
          - not_null
      - name: number_of_orders
        data_tests:
          - not_null
      - name: order_rank
        data_tests:
          - not_null
  - name: fct_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: order_date
        data_tests:
          - not_null
      - name: status
        data_tests:
          - not_null
