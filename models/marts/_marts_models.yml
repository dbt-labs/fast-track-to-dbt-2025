models:
  - name: dim_customers
    description: This model consolidates customer information with their order history, providing insights into customer activity and engagement. It includes personal details and order metrics, such as the first and most recent order dates and the total number of orders.
    columns:
      - name: customer_id
        description: A unique identifier for each customer. (Primary key)
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order_date
        description: The date when the customer placed their first order. This is NULL if no order exists for the customer.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order. This is NULL if no order exists for the customer.
      - name: number_of_orders
        description: The total number of orders placed by the customer.

  - name: fct_orders
    description: This model ranks customers based on the total number of orders they
      have placed. It aggregates order data to count the total orders per customer and
      assigns a rank to each customer based on this count, allowing for easy identification
      of top customers by order volume.
    columns:
    - name: customer_id
      data_tests:
        - unique
        - not_null
      description: A unique identifier for each order.
    - name: total_orders
      description: The total number of orders placed by the customer.
    - name: customer_rank
      description: The rank of the customer based on the total number of orders, with
        1 being the highest.
    