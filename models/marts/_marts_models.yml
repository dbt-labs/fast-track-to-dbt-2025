models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their personal details and order history. It combines customer information with their order data to determine the first and most recent order dates, the total number of orders, and ranks customers based on the number of orders they have placed.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
        data_tests:
          - not_null
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
        data_tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        data_tests:
          - not_null
  - name: fct_orders
    description: This model provides a detailed view of orders, capturing essential information such as order ID, customer ID, order date, and status. It serves as a foundational dataset for analyzing order trends, customer purchasing behavior, and order fulfillment status.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: A unique identifier for the customer who placed the order.
        data_tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment process.
        data_tests:
          - not_null