models:
  - name: dim_customers
    description: This model consolidates customer information with their order history, providing insights into customer activity and engagement. 
     It includes personal details and order metrics, such as the first and most recent order dates, total number of orders, and a rank based on order frequency.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.
      - name: first_order_date
        description: The date when the customer placed their first order.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_rank
        description: The rank of the customer based on the number of orders, with 1 being the highest.

  - name: fct_orders
    description: This model provides a refined view of order data, including essential
     details such as order ID, customer ID, order date, and status. It is designed
     to facilitate analysis of order transactions and customer interactions.
    columns:
      - name: order_id
        description: A unique identifier for each order.
      - name: customer_id
        description: The identifier for the customer who placed the order.
      - name: order_date
        description: The date when the order was placed.
      - name: status
        description: The current status of the order, indicating its progress in the fulfillment
          process.

        