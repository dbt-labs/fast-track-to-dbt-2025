models:
- name: dim_customers
  description: This model consolidates customer information and their order history,
    providing insights into customer activity and engagement. It ranks customers based
    on the number of orders they have placed, helping to identify the most active
    customers.
  columns:
  - name: customer_id
    description: A unique identifier for each customer. (PK)
    data_tests:
      - unique
      - not_null      
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order. (Will be NULL if not order)
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the number of orders, with 1 being
      the most active.
- name: fct_orders
  description: This model provides a refined view of order data, including essential
    details such as order ID, customer ID, order date, and status. It serves as a
    foundational dataset for analyzing order trends and customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
    data_tests:
      - unique
      - not_null    
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
