models:
  - name: fct_orders
    description: This model consolidates order data, providing a comprehensive view of each order placed by customers. It includes essential details such as the order ID, customer ID, order date, and current status of the order, facilitating order tracking and management.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, indicating its progress or completion.
        tests:
          - not_null
  - name: dim_customers
    description: This model provides a detailed view of customers, including their personal information and order history. It combines data from the customers and orders tables to present a comprehensive profile of each customer, including their first and most recent order dates and the total number of orders placed.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        tests:
          - not_null

      - name: first_order_date
        description: The date when the customer placed their first order.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.