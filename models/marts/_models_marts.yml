models:
- name: dim_customers
  description: This model consolidates customer information with their order history,
    providing insights into customer activity such as the date of their first and
    most recent orders, and the total number of orders placed. It is useful for analyzing
    customer engagement and purchase behavior.
  columns:
  - name: customer_id
    description: A unique identifier for each customer. (Primary key)
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.

- name: fct_orders
  description: This model provides a refined view of order data, consolidating essential
    order details such as order ID, customer ID, order date, and status. It serves
    as a foundational dataset for analyzing order trends and customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order. (Primary key)
  - name: customer_id
    description: A unique identifier for the customer who placed the order. (Foreign key)
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process. 
