version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id

      - name: first_name

      - name: last_name

      - name: first_order_date

      - name: most_recent_order_date

      - name: number_of_orders
        data_tests:
          - not_null
