models:
  - name: dim_customers
    description: This model provides a view of customers who have cancelled orders. It combines customer details with their order status to identify those who have cancelled at least one order.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
