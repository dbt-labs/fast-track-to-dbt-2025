models:
  - name: dim_customers
    description: This model provides a dimensional view of customers, aggregating key customer information and order history metrics to support analytical queries.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
      - name: most_recent_order_date
      - name: number_of_orders
      - name: customer_rank
