models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their personal details and order history. It combines customer information with their order data to offer insights into customer behavior, such as the date of their first and most recent orders, the total number of orders placed, and their rank based on order frequency.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_rank
        description: The rank of the customer based on the number of orders placed, with 1 being the highest.
