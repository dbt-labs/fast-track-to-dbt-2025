models:
  - name: dim_customers
    description: One row per customer. Table of customers, may not have necessarily placed an order
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time customer placing an order
      - name: most_recent_order_date
        description: The most recent time the customer placing an order
      - name: number_of_orders
        description: the total number of orders if the customer has placed ANY.
        tests:
          - not_null
      - name: customer_rank
        description: the rank of the customer, based on the total number of orders descending, not unique
        tests:
          - not_null