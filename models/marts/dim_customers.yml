models:
  - name: dim_customers
    description: One row per customer. 
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: first_order_date
        description: The first time the customer placed an order.
      - name: most_recent_order_date
        description: The most recent time the customer placed an order. 
      - name: number_of_orders
        description: The total number of orders if the customer has placed any order. If none, the field will be zero.
      - name: customer_rank
        description: The rank of the customer based on the total number of orders. 