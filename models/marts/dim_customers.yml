models:
  - name: dim_customers
    description: One row per customer.  Table of customers, where not all have necessarily placed an order.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order.
      - name: most_recent_order_date
        description: The most recent time a customer placed any order.  If none, the field will be 0.
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: customer_rank
        description: The rank of the customer, based on the total number of orders descending.  Not unique.
        tests:
          - not_null
