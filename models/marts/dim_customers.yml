models:
  - name: dim_customers
    description: One row per customer. Table of customer, where not all have necessarily placed an order.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order.
      - name: most_recent_order_date
        description: The most recent time a customer placed an order.
      - name: number_of_orders
        description: The number of orders if customer placed an order.
        tests:
          - not_null
      - name: customer_rank
        tests:
          - not_null