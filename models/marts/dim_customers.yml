models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time customer placed an order
      - name: most_recent_order_date
        description: Most recent time a customer placed an order
      - name: number_of_orders
        description: Number of times customer placed an order
      - name: rank
        description: customers rank based on number of orders