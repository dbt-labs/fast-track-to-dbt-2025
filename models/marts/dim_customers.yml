models:
  - name: dim_customers
    description: This model provides a comprehensive view of customers, including their personal details and order history. It ranks customers based on the number of orders they have placed, helping to identify the most active customers. This information is useful for customer segmentation and targeted marketing strategies.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        data_tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        data_tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
        data_tests:
          - not_null
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
        data_tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        data_tests:
          - not_null
      - name: customer_rank
        description: The rank of the customer based on the number of orders, with 1 being the highest.
        data_tests:
          - unique
          - not_null