models:
  - name: dim_customers
    description: One row per customer, where customer not necessarily placed an order
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: first_order_date
        description: The First time a customer placed an order
      #   data_tests:
      #     - not_null
      - name: most_recent_order_date
        description: The most recent time a customer placed an order
      #   data_tests:
      #     - not_null
      - name: number_of_orders
        description: The total number of orders if the customer has placed any, if none field will be 0
        data_tests:
          - not_null
      - name: ranked_customers
        description: The rank of the customer based on total number of orders descending, not unique