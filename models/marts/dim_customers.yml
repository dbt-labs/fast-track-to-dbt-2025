models:
  - name: dim_customers
    description: One row per cusotmer. Table of Customers.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order.
      - name: most_recent_order_date
        description: The most recent time a customer placed an order
      - name: number_of_orders
        description: The total number of orders.  If none the field will be zero
        tests:
          - not_null
      - name: customer_rank
        description: The Rank of the customer, based on the total number of order descending. Not unique
        tests:
          - not_null