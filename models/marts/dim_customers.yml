models:
  - name: dim_customers
    description: one row per customer. table of customers where not all have nec. placed an order
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: the first time a customer placed an order.
      - name: most_recent_order_date
        description: the most recent time a customner placed an order
      - name: number_of_orders
        description: The total number of orders IF the customer has placed any. If none, the field will be 0.