models:
  - name: dim_customers
    description: one row per customer. table of customers, where not all have necessarily placed an order.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order
      - name: most_recent_order_date
        description: The most recent time a customer placed an order
      - name: number_of_orders
        description: The total numer of orders IF the customer has placed any. If none, the field will be 0.
        tests:
          - not_null
      - name: customer_rank
        description: the rank of the customer based on the total number of orders descending. not unique.
        tests:
          - not_null