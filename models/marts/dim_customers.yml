models:
  - name: dim_customers
    description: One row per customer. Table of customers, where not all have placed orders.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order.
      - name: most_recent_order_date
        description: The most recent time a customer placed an order.
      - name: number_of_orders
        description: The total number of orders IF the customer has placed any. IF NONE, the field will be 0.
        tests:
          - not_null
      - name: customer_rank
        description: The rank of the customer based on the total number of orders descnding. Not Unique.
        tests:
          - not_null
