models:
  - name: dim_customers
    columns:
      - name: customer_id
        description: one row per customer
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: first placed order
      - name: most_recent_order_date
        description: recent time customer placed order
      - name: number_of_orders
        description: total number of orders