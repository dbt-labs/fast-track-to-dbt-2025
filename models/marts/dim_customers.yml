models:
  - name: dim_customers
    description: customer dimension with one row per customer and summary attributes about their ordering history.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
        description: unique identifier for the customer.
      - name: first_name
        data_tests:
          - not_null
        description: customer's given name.
      - name: last_name
        data_tests:
          - not_null
        description: customer's family name.
      - name: first_order_date
        description: date of the customer's first order.
      - name: most_recent_order_date
        description: date of the customer's most recent order.
      - name: number_of_orders
        description: total number of orders placed by the customer.
      - name: customer_rank
        description: customer's rank based on total orders placed, with 1 indicating the highest order volume.
