models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
      - name: most_recent_order_date
        description: most recent order the customer placed
      - name: number_of_orders
        description: total orders customer placed
      - name: customer_rank
        description: rank given to customers based on total orders
