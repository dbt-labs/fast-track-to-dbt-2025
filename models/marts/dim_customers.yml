models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order
      - name: most_recent_order_date
        description: The most recent time customer placed an order
      - name: number_of_orders
        description: The total number of orders placed by customer. If none, the value will be 0
      - name: customer_rank
        description: Rank of customer based on total number of orders descending
        data_tests:
          - not_null
