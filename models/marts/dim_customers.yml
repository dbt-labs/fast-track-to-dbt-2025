models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The First order date placed by customer
      - name: most_recent_order_date
        description: The most recent order date placed by customer
      - name: number_of_orders
        description: Total numbers of orders
    