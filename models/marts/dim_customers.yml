models:
  - name: dim_customers
    description: One row per customer. Table of customers, where not all have neccesarily placed an order.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: The first tome a customer place an order.
      - name: most_recent_order_date
        description: The most recent time a customer place an order.
      - name: number_of_orders
        description: The total number of orders if the customer has placed any. If none, the field will be 0.
        tests:
          - not_null
      - name: customer_rank
        description: The rank of the customer, based on the total numner of orders descending. Not unique.
        tests:
          - not_null
