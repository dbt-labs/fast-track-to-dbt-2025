models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: the first time customer plcaed an order
      - name: most_recent_order_date
        description: the most recent time a customer palced an order
      - name: number_of_orders
        description: the total number of orders
      - name: customer_rank
        description: the rank of the customer, based on the total number of orders descending. Not unique.
