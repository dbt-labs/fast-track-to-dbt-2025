version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

      - name: first_name
        data_tests:
          - not_null

      - name: last_name
        data_tests:
          - not_null

      - name: first_order_date

      - name: most_recent_order_date

      - name: number_of_orders
        data_tests:
          - not_null
