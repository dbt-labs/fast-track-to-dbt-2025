models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
      - name: most_recent_order_date
      - name: number_of_orders
        description: The total number of orders if the customer has places any. if none, the field will be 0.
        tests:
          - not_null
      - name: customer_rank
        description:  The rank of the customer, based on the total number of orders descending. NOT - unique
        tests:
          - not_null