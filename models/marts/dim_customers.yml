models:
  - name: dim_customers
    description: One record per customer with first and most recent order dates and total order count.
    semantic_model: true
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: Primary key for the customer.
        entity:
          type: primary
          name: customer
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.
      - name: first_order_date
        description: Date of the customer's first order.
        granularity: day
        dimension:
          type: time
          name: first_order_date
      - name: most_recent_order_date
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: most_recent_order_date
      - name: number_of_orders
        description: Total number of orders placed by the customer.
    metrics:
      - name: repeat_customer_count
        description: Count of customers with more than one order.
        label: Repeat customer count
        type: simple
        agg: count_distinct
        expr: case when number_of_orders > 1 then customer_id end
