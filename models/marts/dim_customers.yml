models:
  - name: dim_customers
    description: One row per customer. Table of customers, where not all have necessarily placed an order.
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed and order.
      - name: most_recent_order_date
        description: The most recent time a customer placed an order.
      - name: number_of_orders
        description: The total number of orders if the customer has placed any. If none, the field will be 0.
      - name: customer_rank
        description: The rank of the customer based on the total number of orders descending. Not unique.