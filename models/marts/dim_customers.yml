models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: first_order_date
        description: first time order placed
      - name: most_recent_order_date
        description: most recent time customer placed orders
      - name: number_of_orders
        description: number of time orders customer placed. If none it is 0.