models:
  - name: dim_customers
    description: one row per customer. Total number of customers,where all not necessarily placed an order
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: first_order_date
        description: The first time a customer placed an order
      - name: most_recent_order_date
        description: The most recent time a customer placed an order
      - name: number_of_orders
        description: The total no of orders if the customers has placed any. If None , it will be returned 0.
        data_tests:
          - not_null
      - name: customer_rank
        data_tests:
          - not_null