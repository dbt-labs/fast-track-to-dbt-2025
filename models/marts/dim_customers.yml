models:
  - name: dim_customers
    description: This model consolidates customer information with their order history, providing insights into customer activity and engagement. It includes personal details and order metrics, such as the date of the first and most recent orders, and the total number of orders placed.
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
        tests:
          - not_null
      - name: last_name
        description: The last name of the customer.
        tests:
          - not_null
      - name: number_of_orders
        description: The total number of orders placed by the customer.
        tests:
          - not_null
      - name: first_order_date
        description: The date when the customer placed their first order.
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.