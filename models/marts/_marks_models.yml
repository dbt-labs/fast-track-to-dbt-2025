models:
- name: dim_customers
  description: This model ranks customers based on the total number of orders they
    have placed. It provides insights into customer activity and helps identify top
    customers by order volume.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
    data_tests:
      - unique
      - not_null
  - name: total_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the total number of orders, with
      1 being the highest.

- name: fct_orders
  description: This model consolidates order information, providing a comprehensive
    view of each order including its unique identifier, the customer who placed it,
    the date it was made, and its current status. It serves as a foundational dataset
    for analyzing order trends and customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The unique identifier of the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
