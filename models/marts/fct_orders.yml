models:
  - name: fct_orders
    description: one record per order with the core customer, date, and lifecycle details for that order
    columns:
      - name: order_id
        description: unique identifier for an order
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: identifier for the customer who placed the order
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id

      - name: order_date
        description: date the order was placed

      - name: status
        description: current lifecycle status of the order
