models:
- name: fct_orders
  description: This model provides a detailed view of orders, including their unique
    identifiers, associated customers, order dates, and current statuses. It is used
    to track and analyze order information for business insights.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The unique identifier of the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, such as pending, shipped, or completed.
