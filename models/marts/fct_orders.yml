models:
- name: fct_orders
  description: This model provides a refined view of order data, including essential
    details such as order ID, customer ID, order date, and status. It serves as a
    foundational dataset for analyzing order trends, customer purchasing behavior,
    and order fulfillment status.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The unique identifier of the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
