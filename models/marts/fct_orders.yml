models:
  - name: fct_orders
    description: This model provides a comprehensive view of orders, including details such as order ID, customer ID, order date, and status. It serves as a foundational dataset for analyzing order-related metrics and trends.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: The identifier for the customer who placed the order.
        tests:
          - not_null
      - name: order_date
        description: The date when the order was placed.
        tests:
          - not_null
      - name: status
        description: The current status of the order, such as pending, shipped, or delivered.
        tests:
          - not_null