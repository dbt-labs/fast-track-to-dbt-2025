models:
- name: fct_orders
  description: This model provides a refined view of orders, including key details
    such as the order ID, customer ID, order date, and status. It is designed to facilitate
    analysis of order data, enabling insights into customer purchasing behavior and
    order processing.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the order
      processing cycle.
