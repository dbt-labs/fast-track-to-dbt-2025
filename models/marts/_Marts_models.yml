models:
- name: dim_customers
  description: This model provides a comprehensive view of customers, including their
    personal details and order history. It ranks customers based on the number of
    orders they have placed, allowing for easy identification of top customers.
  columns:
  - name: customer_id
    description: A unique identifier for each customer.
  - name: first_name
    description: The first name of the customer.
  - name: last_name
    description: The last name of the customer.
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the number of orders, with 1 being
      the highest.

- name: fct_orders
  description: This model provides a detailed view of orders, including their unique
    identifiers, associated customers, order dates, and current statuses. It is designed
    to facilitate analysis of order trends and customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The unique identifier of the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress or completion.
