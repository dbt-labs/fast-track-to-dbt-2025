models:
- name: dim_customers
  description: This model provides a comprehensive view of customers, including their
    first and last names, the date of their first and most recent orders, and the
    total number of orders they have placed. It ranks customers based on the number
    of orders, which can be useful for identifying top customers and analyzing customer
    behavior over time.
  columns:
  - name: first_order_date
    description: The date when the customer placed their first order.
  - name: most_recent_order_date
    description: The date when the customer placed their most recent order.
  - name: number_of_orders
    description: The total number of orders placed by the customer.
  - name: customer_rank
    description: The rank of the customer based on the total number of orders, with
      1 being the highest.

- name: fct_orders
  description: This model consolidates order information, providing a comprehensive
    view of each order's details, including the order ID, customer ID, order date,
    and status. It serves as a foundational dataset for analyzing order trends and
    customer purchasing behavior.
  columns:
  - name: order_id
    description: A unique identifier for each order.
  - name: customer_id
    description: The identifier for the customer who placed the order.
  - name: order_date
    description: The date when the order was placed.
  - name: status
    description: The current status of the order, indicating its progress in the fulfillment
      process.
