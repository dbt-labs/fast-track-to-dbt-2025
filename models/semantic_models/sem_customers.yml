semantic_models:
- name: customers
  description: A customer dimension table containing customer details and order information.
  model: ref('customers')
  defaults:
    agg_time_dimension: first_order_date
  entities:
  - name: customer
    type: primary
    expr: CUSTOMER_ID
  dimensions:
  - name: first_name
    type: categorical
  - name: last_name
    type: categorical
  - name: first_order_date
    type: time
    type_params:
      time_granularity: day
  - name: most_recent_order_date
    type: time
    type_params:
      time_granularity: day
  measures:
  - name: number_of_orders
    description: The total number of orders placed by the customer.
    agg: sum
    create_metric: true
  - name: count_customer
    agg: count
    create_metric: true
    expr: CUSTOMER_ID

metrics:
- name: total_number_of_orders
  description: The total number of orders placed by all customers.
  label: Total Number of Orders
  type: simple
  type_params:
    measure:
      name: number_of_orders
- name: total_customers
  description: The total count of customers.
  label: Total Customers
  type: simple
  type_params:
    measure:
      name: count_customer
- name: average_orders_per_customer
  description: The average number of orders placed per customer.
  label: Average Orders per Customer
  type: derived
  type_params:
    expr: total_number_of_orders / total_customers
    metrics:
    - name: total_number_of_orders
    - name: total_customers
